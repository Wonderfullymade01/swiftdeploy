version: "3.9"

networks:
  swiftdeploy-net:
    driver: bridge

volumes:
  app_logs:

services:
  app:
    image: wonderfullymade-api:latest
    environment:
      - MODE=canary
      - APP_VERSION=1.0.0
      - APP_PORT=3000
    networks:
      - swiftdeploy-net
    volumes:
      - app_logs:/logs
    restart: unless-stopped
    cap_drop:
      - ALL
    user: "1000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "3000"

  nginx:
    image: nginx:latest
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - app_logs:/var/log/nginx
    networks:
      - swiftdeploy-net
    depends_on:
      - app
    restart: unless-stopped